{% extends 'base.html' %}
{% block title %}Register – MobiZone{% endblock %}
{% block extra_css %}
<style>
.auth-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem;
  background: radial-gradient(ellipse at 80% 50%, rgba(67,233,123,.1) 0%, transparent 60%),
              radial-gradient(ellipse at 20% 80%, rgba(108,99,255,.15) 0%, transparent 60%); }
.auth-card { background:var(--card); border:1px solid var(--border); border-radius:24px; padding:2.5rem; width:100%; max-width:420px; }
.auth-logo { text-align:center; margin-bottom:2rem; }
.auth-logo span { font-family:'Syne',sans-serif; font-size:2rem; font-weight:800; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.auth-footer { text-align:center; margin-top:1.5rem; color:var(--muted); font-size:.9rem; }
.auth-footer a { color:var(--accent); text-decoration:none; }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo"><span>📱 MobiZone</span></div>
    <h2 style="margin-bottom:1.5rem;">Create Account</h2>
    <form method="POST">
      <div class="form-group"><label>Full Name</label><input type="text" name="name" placeholder="John Doe" required></div>
      <div class="form-group"><label>Email Address</label><input type="email" name="email" placeholder="you@example.com" required></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" placeholder="Min 6 characters" required minlength="6"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.75rem;">Create Account →</button>
    </form>
    <div class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Login</a></div>
  </div>
</div>
{% endblock %}
