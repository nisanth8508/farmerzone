{% extends 'base.html' %}
{% block title %}Login – MobiZone{% endblock %}
{% block extra_css %}
<style>
.auth-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem;
  background: radial-gradient(ellipse at 20% 50%, rgba(108,99,255,.15) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 20%, rgba(255,101,132,.1) 0%, transparent 60%); }
.auth-card { background:var(--card); border:1px solid var(--border); border-radius:24px; padding:2.5rem; width:100%; max-width:420px; }
.auth-logo { text-align:center; margin-bottom:2rem; }
.auth-logo span { font-family:'Syne',sans-serif; font-size:2rem; font-weight:800; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.auth-logo p { color:var(--muted); font-size:.9rem; margin-top:.4rem; }
.auth-card h2 { font-size:1.4rem; margin-bottom:1.5rem; }
.auth-footer { text-align:center; margin-top:1.5rem; color:var(--muted); font-size:.9rem; }
.auth-footer a { color:var(--accent); text-decoration:none; }
.demo-info { background:rgba(108,99,255,.1); border:1px solid rgba(108,99,255,.2); border-radius:10px; padding:.8rem 1rem; margin-bottom:1.5rem; font-size:.82rem; color:var(--muted); }
.demo-info strong { color:var(--accent); }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <span>📱 MobiZone</span>
      <p>Mobile Accessories Store</p>
    </div>
    <h2>Welcome Back</h2>
    <div class="demo-info">
      <strong>Demo Admin:</strong> admin@shop.com / admin123
    </div>
    <form method="POST">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.75rem;">Login →</button>
    </form>
    <div class="auth-footer">
      New here? <a href="{{ url_for('register') }}">Create account</a>
    </div>
  </div>
</div>
{% endblock %}
